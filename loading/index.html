<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>loopat — 启动中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{text-align:center;max-width:480px;padding:2rem}
.logo{font-size:3rem;margin-bottom:1rem;user-select:none}
h1{font-size:1.5rem;font-weight:600;margin-bottom:.5rem}
#status{color:#8b949e;font-size:.875rem;margin-bottom:1.5rem}
.spinner{width:36px;height:36px;border:3px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🧶</div>
  <h1>loopat 启动中</h1>
  <p id="status">正在配置环境…</p>
  <div class="spinner"></div>
</div>
<script>
// Tauri will replace this page once the server is ready
const el = document.getElementById('status')
const messages = [
  '正在配置环境…',
  '正在导入 loopat 发行版…',
  '正在启动 loopat 服务…',
  '即将就绪…',
]
let i = 0
setInterval(() => {
  i = (i + 1) % messages.length
  el.textContent = messages[i]
}, 3000)
</script>
</body>
</html>
