<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loopat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f0f0f; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
    .container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    .logo { font-size: 48px; line-height: 1; }
    .title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .status { font-size: 14px; color: #888; min-height: 20px; text-align: center; max-width: 400px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #888; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #1a0a0a; border: 1px solid #4a1515; border-radius: 8px; padding: 16px 20px; max-width: 480px; font-size: 13px; color: #e57373; line-height: 1.6; }
    .error-box pre { font-family: "SF Mono", monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; margin-top: 8px; color: #cc6666; }
    .btn { padding: 8px 20px; border-radius: 6px; border: 1px solid #444; background: #1f1f1f; color: #e5e5e5; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #2a2a2a; }
    #spinner-row { display: flex; align-items: center; gap: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🧶</div>
    <div class="title">loopat</div>
    <div id="spinner-row"><div class="spinner"></div></div>
    <div class="status" id="status">Starting virtual machine…</div>
    <div id="error-container" style="display:none"></div>
    <button class="btn" id="logs-btn" onclick="openLogs()">Show Logs</button>
  </div>

  <script>
    const { invoke, event } = window.__TAURI__;

    async function openLogs() {
      // Menu triggers this from Rust; can also open via JS
      await invoke('show_logs_window').catch(() => {});
    }

    event.listen('vm-status', (ev) => {
      const { status, message, url } = ev.payload;

      if (status === 'starting') {
        setStatus(message || 'Starting virtual machine…');
      } else if (status === 'decompressing') {
        setStatus(message || 'Preparing disk image…');
      } else if (status === 'ready') {
        setStatus('Server ready, loading…');
        // Navigation is handled by Rust (window.navigate), but as fallback:
        setTimeout(() => { if (url) window.location.href = url; }, 500);
      } else if (status === 'error') {
        showError(message || 'Unknown error');
      }
    });

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showError(msg) {
      document.getElementById('spinner-row').style.display = 'none';
      setStatus('');
      document.getElementById('logs-btn').style.display = 'block';
      const box = document.getElementById('error-container');
      box.style.display = 'block';
      box.innerHTML = `<div class="error-box">
        <strong>Failed to start VM</strong>
        <pre>${escapeHtml(msg)}</pre>
      </div>`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // If Tauri APIs not available (browser test), show a placeholder
    if (!window.__TAURI__) {
      setStatus('(Run inside the loopat macOS app)');
    }
  </script>
</body>
</html>
